name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ELIXIR_VERSION: 1.20.1
  OTP_VERSION: "29.0"
  RUST_VERSION: 1.96.0
  MIX_ENV: test
  FORNACAST_DATABASE_ADAPTER: turso

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential git libssl-dev openssh-client pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache test dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.hex
            ~/.cache/rebar3
            ~/.cargo/git
            ~/.cargo/registry
          key: ${{ runner.os }}-test-${{ env.MIX_ENV }}-${{ hashFiles('mix.lock', 'apps/git_core/native/fornacast_git_core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.MIX_ENV }}-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run unit tests
        run: mix test
